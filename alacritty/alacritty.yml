font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
  italic:
    family: JetBrainsMono Nerd Font

colors:
  primary:
    background: '0x000000' 

window:
  dimensions:
    columns: 140
    lines: 65
  position:
    x: 395
    y: 51

scrolling:
  history: 10000
  multiplier: 3

mouse:
  enabled: true
  hide_when_typing: false

key_bindings:
  - { key: V, mods: Control, action: Paste }
