set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-style "bg=#010112,fg=#FAE4EF"
set -g status-left "#[fg=#70A7B2,bold] rmpc #[fg=#606167]#{session_name} "
set -g status-right "#[fg=#BC92C0,bold]#(if [ -x \"$HOME/.local/bin/music-system-quality.sh\" ]; then \"$HOME/.local/bin/music-system-quality.sh\"; else \"/home/cinmay/Documents/dotfiles/omarchy/.local/bin/music-system-quality.sh\"; fi) "
set -g message-style "bg=#05051C,fg=#FAE4EF"
set -g mode-style "bg=#70A7B2,fg=#010112"
set -g pane-active-border-style "fg=#BC92C0"
set -g pane-border-style "fg=#70A7B2"
set -g window-status-current-style "fg=#010112,bg=#70A7B2,bold"
set -g window-status-style "fg=#FAE4EF,bg=#010112"
set -g allow-passthrough on
set -g mouse on
set -g escape-time 10
set -ga terminal-overrides ",xterm-ghostty:RGB"
