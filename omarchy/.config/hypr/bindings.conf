# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

# bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
#bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
#bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-webapp "https://music.youtube.com"
#bindd = SUPER SHIFT, M, Music, exec, hyprctl dispatch workspace 11; omarchy-launch-webapp "https://music.youtube.com"

bindd = SUPER, M, Music, exec, $HOME/.local/bin/youtube-music.sh
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
# bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
#bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"

unbind = SUPER, T #Remove binding for toggle floating
bindd = SUPER SHIFT, T, Toggle floating, togglefloating
bindd = SUPER, T, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"

unbind = SUPER, F
bindd = SUPER SHIFT, F, Full screen, fullscreen
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
