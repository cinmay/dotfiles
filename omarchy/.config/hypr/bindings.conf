# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
exec-once = hyprctl dispatch renameworkspace 6 "terminal"
exec-once = hyprctl dispatch renameworkspace 10 "editor"
exec-once = hyprctl dispatch renameworkspace 11 "music"
exec-once = hyprctl dispatch renameworkspace 12 "chatgpt"
exec-once = hyprctl dispatch renameworkspace 13 "obsidian"
exec-once = hyprctl dispatch renameworkspace 14 "discord"
exec-once = hyprctl dispatch renameworkspace 15 "git"

$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

unbind = SUPER, G # Remove default toggle window grouping binding

bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER, D, Discord, exec, $HOME/.local/bin/discord.sh
bindd = SUPER, M, Music, exec, $HOME/.local/bin/youtube-music.sh
bindd = SUPER, E, Editor, exec, $HOME/.local/bin/editor-terminal.sh
bindd = SUPER, G, Git, exec, $HOME/.local/bin/git-terminal.sh
bindd = SUPER, N, Notes, exec,  $HOME/.local/bin/notes-terminal.sh
bindd = SUPER, A, ChatGPT, exec, $HOME/.local/bin/chatgpt.sh
bindd = SUPER, H, Home workspace, workspace, 1
bindd = SUPER, I, Terminal, exec, $HOME/.local/bin/terminal-terminal.sh

unbind = SUPER, T #Remove binding for toggle floating
bindd = SUPER SHIFT, T, Toggle floating, togglefloating
bindd = SUPER, T, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"

unbind = SUPER, F
bindd = SUPER SHIFT, F, Full screen, fullscreen
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window

unbind = SUPER, V
bindd = SUPER, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

unbind = SUPER SHIFT, SPACE
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, pkill -SIGUSR1 waybar

# Route media play/pause to active Neovim TTS before falling back to playerctl.
unbind = , XF86AudioPause
unbind = , XF86AudioPlay
bindld = , XF86AudioPause, Pause, exec, $HOME/.config/nvim/scripts/nvim-tts-control media-toggle
bindld = , XF86AudioPlay, Play, exec, $HOME/.config/nvim/scripts/nvim-tts-control media-toggle
